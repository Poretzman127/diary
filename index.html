<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#f5efe1">
<title>Debrief</title>
<link rel="icon" href="favicon.ico?v=1" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png?v=1">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png?v=1">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png?v=1">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png?v=1">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png?v=1">
<link rel="stylesheet" href="styles.css?v=3">
</head>
<body class="locked">

<!-- Login gate -->
<div class="gate" id="gate">
  <div class="gate-card">
    <div class="gate-brand">Debrief</div>
    <div class="gate-sub" id="gate-sub">Sign in to your journal.</div>
    <form id="gate-form" autocomplete="off">
      <input id="gate-user" type="text" placeholder="Username" autocomplete="username" required>
      <input id="gate-pw" type="password" placeholder="Password" autocomplete="current-password" required>
      <button type="submit" id="gate-btn">Sign in</button>
      <div class="gate-err" id="gate-err"></div>
    </form>
    <div class="gate-foot">Each account keeps a private set of entries.</div>
  </div>
</div>

<!-- App shell -->
<div class="app" id="app" hidden>
  <aside class="side" id="side">
    <div class="side-head">
      <div class="side-title">Entries</div>
      <button class="side-new" id="new-btn" title="New entry">＋</button>
    </div>
    <input class="side-search" id="search" type="search" placeholder="Search…" autocomplete="off">
    <div class="side-list" id="entry-list"></div>
    <div class="side-foot">
      <div class="side-user" id="side-user"></div>
      <button class="side-lock" id="logout-btn">Log out</button>
      <div class="side-build">v2026-07-17b</div>
    </div>
  </aside>

  <button class="side-toggle" id="side-toggle" aria-label="Show entries">☰</button>

  <main class="main">
    <header class="page-head">
      <div class="page-date-wrap" title="Tap to change date">
        <span class="page-date" id="page-date-label"></span>
        <input type="date" id="page-date-picker" aria-label="Change entry date">
      </div>
      <div class="page-actions">
        <button class="btn-danger" id="delete-btn" title="Delete entry" hidden>🗑</button>
        <button class="btn-primary" id="publish-btn" title="Save entry">✓</button>
      </div>
    </header>

    <input class="entry-title" id="entry-title" type="text" placeholder="Title (optional)…" maxlength="140">

    <div class="entry-body" id="entry-body" contenteditable="true" spellcheck="true" data-placeholder="Dear diary…"></div>

    <section class="song">
      <div class="song-title">Song of the day</div>
      <input class="song-input" id="entry-song" type="text" placeholder="What was playing?…" maxlength="140">
    </section>

    <section class="ratings" id="ratings"></section>

    <div class="status" id="status"></div>
  </main>
</div>

<script src="app.js?v=3"></script>
</body>
</html>
